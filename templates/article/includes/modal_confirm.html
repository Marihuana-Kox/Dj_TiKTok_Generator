<!-- Модальное окно подтверждения и статуса -->
<div id="status-modal" class="modal-overlay">
  <div class="modal-content">
    
    <!-- Кнопка закрытия (крестик) -->
    <button id="modal-close-x" class="modal-close">&times;</button>

    <h3 id="status-modal-title" class="modal-title">🚀 Подготовка к генерации</h3>
    
    <!-- Блок со сводкой настроек -->
    <div id="status-summary" class="modal-summary">
        <!-- Сюда JS вставит список -->
    </div>

    <!-- Кнопки управления -->
    <div id="status-actions" class="modal-actions">
        <button id="btn-confirm-start" class="btn btn-success">✅ Продолжить</button>
        <button id="btn-cancel-start" class="btn btn-secondary">❌ Отменить</button>
    </div>

    <!-- Блок прогресс-бара (скрыт по умолчанию) -->
    <div id="status-progress-block" class="modal-progress-block d-none">
        <div class="progress-status-text" id="progress-status-text">Инициализация...</div>
        
        <div class="progress-track">
            <div id="gen-progress-bar" class="progress-bar progress-bar-animated"></div>
        </div>
        
        <div class="progress-details" id="progress-details"></div>
    </div>

  </div>
</div>
