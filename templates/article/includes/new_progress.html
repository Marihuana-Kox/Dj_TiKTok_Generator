<!-- Модальное окно прогресса -->
<div id="progress-modal" class="modal d-none" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5);">
    <div class="modal-content" style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 60%; border-radius: 8px;">
      <span id="close-progress-modal" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
      <h3>🚀 Генерация статей</h3>
      
      <p id="gen-progress-message">Инициализация...</p>
      
      <!-- Прогресс бар -->
      <div style="width: 100%; background-color: #e0e0e0; border-radius: 4px; margin: 10px 0;">
        <div id="gen-progress-bar" class="progress-bar bg-primary progress-bar-animated" style="width: 0%; height: 25px; border-radius: 4px; transition: width 0.3s;">
          <span id="gen-progress-percent" style="line-height: 25px; margin-left: 10px; color: white; font-weight: bold;">0%</span>
        </div>
      </div>
  
      <!-- Лог (опционально) -->
      <div style="margin-top: 20px; max-height: 200px; overflow-y: auto; background: #f8f9fa; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
        <small class="text-muted">Лог операций:</small>
        <ul id="gen-progress-log" style="list-style: none; padding: 0; margin: 5px 0 0 0; font-size: 0.9em;"></ul>
      </div>
    </div>
  </div>
